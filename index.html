const pc=document.getElementById('particleCanvas'),px=pc.getContext('2d');

// spawn a particle near mouse
setInterval(()=>{
  if(!hasMouse)return;
  const colors=['rgba(0,245,255,','rgba(167,139,250,','rgba(251,191,36,'];
  const c=colors[Math.floor(Math.random()*colors.length)];
  particles.push({
    x:mouseX+(Math.random()-0.5)*30,
    y:mouseY+(Math.random()-0.5)*30,

    vy:(Math.random()-0.5)*1.2-0.5,

  });

}
