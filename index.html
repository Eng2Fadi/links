<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<title>Fadi AbuSaada</title>

<style>
:root{
--bg:#00040f;
--card:#0c1222;
--text:#e2eeff;
--muted:#aaa;
--accent:#00f5ff;
}

body.light{
--bg:#f5f7ff;
--card:#ffffff;
--text:#111;
--muted:#555;
--accent:#4f46e5;
}

body{
margin:0;
font-family:'Tajawal',sans-serif;
background:var(--bg);
color:var(--text);
transition:.3s;
}

.container{
max-width:460px;
margin:auto;
padding:20px;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.btn{
background:var(--card);
padding:6px 12px;
border-radius:10px;
cursor:pointer;
border:1px solid var(--accent);
}

h1{
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:var(--muted);
margin-bottom:20px;
}

.cta{
background:#10b981;
padding:14px;
border-radius:16px;
text-align:center;
cursor:pointer;
margin-bottom:25px;
font-weight:bold;
}

.links{
display:flex;
flex-direction:column;
gap:10px;
margin-bottom:25px;
}

.link{
background:var(--card);
padding:12px;
border-radius:12px;
text-decoration:none;
color:var(--accent);
border:1px solid var(--accent);
}

.card{
background:var(--card);
padding:15px;
border-radius:16px;
border:1px solid var(--accent);
}

.title{
color:var(--accent);
margin-bottom:10px;
font-weight:bold;
}

.chat{
height:220px;
overflow:auto;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
padding:10px;
border-radius:10px;
max-width:80%;
font-size:14px;
}

.user{
background:#1f2937;
align-self:flex-end;
}

.bot{
background:#111827;
align-self:flex-start;
}

.row{
display:flex;
gap:5px;
margin-top:10px;
}

input{
flex:1;
padding:10px;
border-radius:10px;
border:none;
background:#111;
color:#fff;
}

body.light input{
background:#eee;
color:#000;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:var(--accent);
cursor:pointer;
}
</style>



</head>
<body>

<div class="container">

<div class="top">
<div class="btn" onclick="toggleLang()">🌐</div>
<div class="btn" onclick="toggleTheme()">🌙</div>
</div>

<h1>Fadi AbuSaada</h1>

<div class="subtitle" id="desc">
أبني أنظمة AI توفر لك 20+ ساعة أسبوعياً
</div>

<div class="cta" onclick="goWhats()" id="cta">
🚀 ابدأ مشروعك الآن
</div>

<div class="links">

<a class="link" href="https://eng2fadi.github.io">🌐 Portfolio</a>
<a class="link" href="https://github.com/Eng2Fadi">💻 GitHub</a>
<a class="link" href="https://linkedin.com">🔗 LinkedIn</a>
<a class="link" href="https://upwork.com">🟢 Upwork</a>
<a class="link" href="https://khamsat.com">🟠 Khamsat</a>
<a class="link" href="https://mostaql.com">🔵 Mostaql</a>
<a class="link" href="https://wa.me/972599930699">📱 WhatsApp</a>

</div>

<div class="card">

<div class="title">AI Assistant</div>

<div class="chat" id="chat"></div>

<div class="row">
<input id="input" placeholder="اكتب فكرة مشروعك">
<button onclick="send()">➤</button>
</div>

</div>

</div>


  
<script>

// ===== Theme =====
function toggleTheme(){
document.body.classList.toggle("light")
}

// ===== Language =====
let lang="ar"

const T={
ar:{
desc:"أبني أنظمة AI توفر لك 20+ ساعة أسبوعياً",
cta:"🚀 ابدأ مشروعك الآن",
placeholder:"اكتب فكرة مشروعك..."
},
en:{
desc:"I build AI systems that save you 20+ hours weekly",
cta:"🚀 Start your project now",
placeholder:"Describe your idea..."
}
}

function toggleLang(){
lang = lang==="ar"?"en":"ar"

document.documentElement.lang=lang
document.body.dir=lang==="ar"?"rtl":"ltr"

document.getElementById("desc").innerText=T[lang].desc
document.getElementById("cta").innerText=T[lang].cta
document.getElementById("input").placeholder=T[lang].placeholder
}

// ===== Chat =====
const chat=document.getElementById("chat")

function add(text,type){
let d=document.createElement("div")
d.className="msg "+type
d.innerText=text
chat.appendChild(d)
chat.scrollTop=chat.scrollHeight
}

async function send(){

let input=document.getElementById("input")
let msg=input.value.trim()

if(!msg) return

add(msg,"user")
input.value=""

let typing=document.createElement("div")
typing.className="msg bot"
typing.innerText="..."
chat.appendChild(typing)

try{

let res=await fetch("https://noisy-fire-91c3.eng-fadi990.workers.dev",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
messages:[{role:"user",content:msg}]
})
})

let data=await res.json()

typing.remove()

let reply=data.choices?.[0]?.message?.content || "Error"

add(reply,"bot")

}catch(e){
typing.remove()
add("❌ خطأ في الاتصال","bot")
}

}

// ===== WhatsApp =====
function goWhats(){
window.open("https://wa.me/972599930699")
}

</script>

</body>
</html>
