<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fadi AbuSaada | AI Engineer</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#00040f;
color:#fff;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

h1{margin-bottom:5px}

.card{
background:#0c1222;
border-radius:14px;
padding:15px;
margin-bottom:15px;
border:1px solid #00f5ff22;
}

.title{
color:#00f5ff;
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:none;
background:#111;
color:#fff;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:#00f5ff;
cursor:pointer;
}

.output{
margin-top:10px;
white-space:pre-line;
font-size:14px;
}

.cta{
padding:12px;
background:#10b981;
text-align:center;
border-radius:10px;
cursor:pointer;
margin-bottom:15px;
}

.quick{
display:flex;
flex-wrap:wrap;
gap:5px;
margin-top:10px;
}

.quick button{
background:#222;
color:#fff;
padding:6px 10px;
font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>Fadi AbuSaada</h1>
<p>مهندس AI وخبير أتمتة</p>

<div class="cta" onclick="goWhats()">
🚀 ابدأ مشروعك الآن
</div>

<div class="card">
<div class="title">AI Assistant</div>

<input id="msg" placeholder="اكتب فكرة مشروعك...">

<div class="quick">
<button onclick="quick('Chatbot')">Chatbot</button>
<button onclick="quick('Automation')">Automation</button>
<button onclick="quick('AI Agent')">AI Agent</button>
<button onclick="quick('SaaS')">SaaS</button>
</div>

<button onclick="send()">إرسال</button>

<div id="out" class="output"></div>

<button onclick="sendSummary()" style="background:#8b5cf6">
📩 إرسال لفادي
</button>

<button onclick="estimate()" style="background:#f59e0b">
💰 احسب تكلفة
</button>

</div>

</div>

<script>

let history=[]
let projectData={}

function quick(type){
document.getElementById("msg").value="أريد مشروع "+type
}

function goWhats(){
window.open("https://wa.me/972599930699")
}

async function send(){

let input=document.getElementById("msg")
let msg=input.value.trim()
if(!msg) return

input.value=""

history.push({role:"user",content:msg})

document.getElementById("out").innerText += "\n👤 "+msg

// smart extraction
if(msg.includes("Chatbot")) projectData.type="Chatbot"
if(msg.includes("Automation")) projectData.type="Automation"
if(msg.includes("Agent")) projectData.type="AI Agent"

try{

let res=await fetch("https://noisy-fire-91c3.eng-fadi990.workers.dev",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({messages:history})
})

let data=await res.json()
let reply=data.choices?.[0]?.message?.content || "..."

history.push({role:"assistant",content:reply})

document.getElementById("out").innerText += "\n🤖 "+reply+"\n"

}catch(e){
document.getElementById("out").innerText += "\n❌ خطأ\n"
}

}

// ===== ESTIMATOR =====
function estimate(){

let price=""

if(projectData.type==="Chatbot") price="$50 - $150"
else if(projectData.type==="Automation") price="$100 - $300"
else if(projectData.type==="AI Agent") price="$150 - $500"
else price="حسب التفاصيل"

document.getElementById("out").innerText += "\n💰 تقدير التكلفة: "+price+"\n"
}

// ===== SEND SUMMARY =====
function sendSummary(){

let text="مرحبا فادي، هذا ملخص مشروعي:\n\n"

history.forEach(m=>{
text+= (m.role==="user"?"👤 ":"🤖 ")+m.content+"\n"
})

window.open("https://wa.me/972599930699?text="+encodeURIComponent(text))

}

</script>

</body>
</html>
